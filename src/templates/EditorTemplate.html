<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>CowEngine - Editor</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            background: #111;
            color: #eee;
            font-family: Arial;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #main {
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            box-sizing: border-box;
            min-height: 0;
        }

        #canvas {
            display: block;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            background: #000;
        }

        /* overlays */
        .overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* default: don't intercept unless explicitly enabled */
        }

        #loadingOverlay {
            background: rgba(0, 0, 0, 0.85);
            color: #ddd;
            z-index: 40;
            pointer-events: auto;
            flex-direction: column;
        }

        #startOverlay {
            position: absolute;
            z-index: 30;
            color: #fff;
            text-shadow: 0 1px 0 rgba(0, 0, 0, 0.7);
            font-size: 20px;
            pointer-events: auto;
            cursor: pointer;
        }

        #output {
            display: none;
        }
    </style>
</head>

<body>
    <div id="main" style="position:relative;">
        <canvas id="canvas"></canvas>
        <div id="loadingOverlay" class="overlay">
            <div>
                <div style="margin-bottom:12px; font-size:24px;">Loading CowEngine...</div>
                <div style="font-size:14px; color:#bbb;">Initializing runtime and resources. Please wait.</div>
            </div>
        </div>
        <div id="startOverlay" class="overlay" style="display:none;">
            <div id="startText">Click to start</div>
        </div>
        <textarea id="output" readonly></textarea>
    </div>

    <script>
        // Predefine Module to avoid auto-running main; expose runtime hook and start-on-canvas-click
        var output = document.getElementById('output');
        function appendLog(msg) {
            output.value += msg + '\n';
            output.scrollTop = output.scrollHeight;
        }

        // Responsive canvas sizing available before Emscripten runtime initializes
        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (!canvas) return;
            var ratio = window.devicePixelRatio || 1;
            // Always use window.innerWidth/Height — editor fills full window and
            // parent.clientHeight lags on DevTools open/close due to canvas
            // intrinsic-size feedback through flex-basis.
            canvas.width = Math.max(1, Math.floor(window.innerWidth * ratio));
            canvas.height = Math.max(1, Math.floor(window.innerHeight * ratio));
            if (typeof Module !== 'undefined' && Module) {
                Module.canvas = canvas;
            }
        }

        // Run early so initial page layout doesn't create scrollbars
        document.addEventListener('DOMContentLoaded', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);
        document.addEventListener('fullscreenchange', resizeCanvas);

        var Module = {
            noInitialRun: false,
            print: function () { var s = Array.prototype.join.call(arguments, ' '); console.log(s); appendLog(s); },
            printErr: function () { var s = Array.prototype.join.call(arguments, ' '); console.error(s); appendLog('ERR: ' + s); },
            setStatus: function (s) { appendLog('[status] ' + s); },
            onRuntimeInitialized: function () {
                appendLog('Runtime initialized. Starting automatically.');
                // hide loading and start overlays
                var load = document.getElementById('loadingOverlay');
                if (load) load.style.display = 'none';
                var startO = document.getElementById('startOverlay');
                if (startO) startO.style.display = 'none';
                Module.mouseSensitivity = 1.0;
                // Call main immediately now that runtime is ready
                Module.print('Auto-start: main will be invoked by runtime.');
                // Block context menu on canvas for better right-click handling in the engine and editor
                var canvas = document.getElementById('canvas');
                if (canvas) {
                    canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });
                }
                window.addEventListener('resize', resizeCanvas);
                document.addEventListener('fullscreenchange', resizeCanvas);
                // initial sizing
                resizeCanvas();
            }
        };
    </script>
    <script async src="CowEngine.js"></script>
</body>

</html>

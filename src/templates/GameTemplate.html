<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>CowEngine Game</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            background: #000;
            color: #eee;
            font-family: Arial, sans-serif;
            overflow: hidden;
            /* Stop pull-to-refresh / rubber-banding from eating drags. */
            overscroll-behavior: none;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #main {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
        }

        #canvas {
            display: block;
            flex: 1 1 auto;
            min-width: 0;
            min-height: 0;
            background: #000;
            outline: none;
            touch-action: none;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #loadingOverlay {
            background: #000;
            z-index: 40;
            flex-direction: column;
        }

        #startOverlay {
            background: rgba(0, 0, 0, 0.6);
            z-index: 30;
            cursor: pointer;
            font-size: 22px;
            color: #fff;
        }

        #startOverlay .hint {
            font-size: 14px;
            color: #bbb;
            margin-top: 12px;
        }

        #gateOverlay {
            background: rgba(0, 0, 0, 0.92);
            z-index: 50;
            flex-direction: column;
            display: none;
        }

        #gateOverlay .panel {
            width: 90%;
            max-width: 340px;
        }

        #gateOverlay h1 {
            font-size: 24px;
            margin: 0 0 4px;
        }

        #gateOverlay .sub {
            font-size: 13px;
            color: #999;
            margin: 0 0 20px;
        }

        #gateOverlay form {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        #gateOverlay input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #eee;
            font-size: 15px;
        }

        #gateOverlay button {
            padding: 10px 16px;
            border-radius: 6px;
            border: 0;
            font-size: 15px;
            cursor: pointer;
        }

        #gateOverlay .join-btn {
            background: #4a7;
            color: #fff;
        }

        #gateOverlay .sp-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #444;
            color: #eee;
        }

        #gateOverlay .error {
            color: #e77;
            font-size: 13px;
            margin: 10px 0 0;
            min-height: 16px;
        }

        /* ---- On-screen touch controls (mobile) ----
           Sits above the canvas but below the start/gate overlays, so those
           still take the first tap. Hidden until a touch device is detected. */
        #touchControls {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #touchControls.on {
            display: block;
        }

        /* Positioned by JS at the point the left-hand thumb lands, so the
           stick comes to the player rather than the reverse. */
        #stick {
            position: absolute;
            width: 124px;
            height: 124px;
            margin: -62px 0 0 -62px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
            opacity: 0.4;
            transition: opacity .15s ease;
        }

        #stick.active {
            opacity: 1;
        }

        #stickKnob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 56px;
            height: 56px;
            margin: -28px 0 0 -28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .touch-btn {
            position: absolute;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font: 600 13px/1 Arial, sans-serif;
            letter-spacing: .06em;
            opacity: 0.75;
        }

        .touch-btn.held {
            background: rgba(255, 255, 255, 0.3);
            opacity: 1;
        }

        /* env() keeps the buttons clear of the iOS home indicator. */
        #jumpBtn {
            right: 26px;
            bottom: calc(34px + env(safe-area-inset-bottom, 0px));
        }

        #shootBtn {
            right: 116px;
            bottom: calc(92px + env(safe-area-inset-bottom, 0px));
        }
    </style>
</head>

<body>
    <div id="main">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="loadingOverlay" class="overlay">
            <div>
                <div style="font-size:24px; margin-bottom:12px;">Loading...</div>
                <div style="font-size:13px; color:#888;">Decompressing assets</div>
            </div>
        </div>
        <div id="startOverlay" class="overlay" style="display:none;">
            <div>
                <div>Click to play</div>
                <div class="hint">WASD to move, mouse to look, Space to jump, Tab to release cursor</div>
            </div>
        </div>
        <div id="touchControls">
            <div id="stick">
                <div id="stickKnob"></div>
            </div>
            <button id="jumpBtn" class="touch-btn" type="button">JUMP</button>
            <button id="shootBtn" class="touch-btn" type="button">SHOOT</button>
        </div>
        <div id="gateOverlay" class="overlay">
            <div class="panel">
                <h1>CowEngine</h1>
                <p class="sub">Join the shared world with a key, or play solo.</p>
                <form id="joinForm">
                    <input id="joinKeyInput" type="text" placeholder="Room key" autocomplete="off" autocapitalize="off" spellcheck="false">
                    <button type="submit" class="join-btn">Join</button>
                </form>
                <button id="singleplayerBtn" type="button" class="sp-btn">Play Singleplayer</button>
                <p id="joinError" class="error"></p>
            </div>
        </div>
    </div>

    <script>
        // Populated at export time by GameBuilder (base64-encoded scene JSON).
        // GameBuilder replaces this line; null means use the scene baked into CowEngine.data.
        var __COWENGINE_SCENE__ = null;

        // Multiplayer server config, injected by GameBuilder (or overridden by
        // ?wt=/?ws=/?certhash= query params). null = single-player only.
        //   { wt: "https://host:4443", ws: "wss://host:8080", certHash: "<base64 sha-256>" }
        var __COWENGINE_SERVER__ = null;

        // ---- Join gate: ask for a room key (shared world) or singleplayer ---
        // Only relevant when this export has a multiplayer server baked in; a
        // plain singleplayer export has nothing to gate and skips straight to
        // loading. The choice is round-tripped through a page reload (?key=/
        // ?singleplayer=1) rather than blocking WASM startup, so it works with
        // no changes to the C++ side: main() reads window.CowNet.config, which
        // is resolved below from whichever query param made it here.
        (function () {
            var hasServer = !!(__COWENGINE_SERVER__ && (__COWENGINE_SERVER__.wt || __COWENGINE_SERVER__.ws));
            if (!hasServer)
                return;
            var params = new URLSearchParams(location.search);
            // Already resolved (redirected here with a choice) or a developer
            // override (?wt=/?ws=) is present: skip the gate.
            if (params.has('key') || params.has('singleplayer') || params.has('wt') || params.has('ws'))
                return;

            var gate = document.getElementById('gateOverlay');
            gate.style.display = 'flex';

            function proceed(param, value) {
                var url = new URL(location.href);
                url.searchParams.set(param, value);
                location.href = url.toString();
            }

            document.getElementById('joinForm').addEventListener('submit', function (e) {
                e.preventDefault();
                var key = document.getElementById('joinKeyInput').value.trim();
                if (!key) {
                    document.getElementById('joinError').textContent = 'Enter a key to join the shared world.';
                    return;
                }
                proceed('key', key);
            });

            document.getElementById('singleplayerBtn').addEventListener('click', function () {
                proceed('singleplayer', '1');
            });
        })();

        // ---- CowNet: browser transport shim ---------------------------------
        // WebTransport (HTTP/3) primary, WebSocket fallback. Presents one uniform
        // send(channel,bytes)/state interface to the WASM client (WebClientTransport
        // calls in via EM_JS) and pushes inbound messages into the wasm queue via
        // the exported _cow_net_deliver. Channels: 0 = unreliable, 1 = reliable.
        window.CowNet = (function () {
            var ST = { DISCONNECTED: 0, CONNECTING: 1, CONNECTED: 2, FAILED: 3 };
            var state = ST.DISCONNECTED;
            var sendFn = null;      // function(channel, Uint8Array)
            var observer = null;    // optional JS observer(channel, Uint8Array)

            // Resolve the server config once, from GameBuilder's injected value
            // plus ?wt/?ws/?certhash overrides. The WASM client reads hasServer()
            // and calls connect(); JS owns config, C++ owns the protocol.
            //
            // The join gate above sends players here with either
            // ?singleplayer=1 (never connect, regardless of what's baked in) or
            // ?key=<value> (join the shared room — appended to wt/ws so the
            // sidecar's COW_JOIN_KEY gate, see deploy/.env.example, admits us).
            var config = (function () {
                var q = null;
                try { q = new URLSearchParams(location.search); } catch (e) { }
                if (q && q.get('singleplayer'))
                    return {};
                var c = Object.assign({}, __COWENGINE_SERVER__ || {});
                if (q) {
                    if (q.get('wt')) c.wt = q.get('wt');
                    if (q.get('ws')) c.ws = q.get('ws');
                    if (q.get('certhash')) c.certHash = q.get('certhash');
                    var key = q.get('key');
                    if (key) {
                        if (c.wt) c.wt += (c.wt.indexOf('?') === -1 ? '?' : '&') + 'key=' + encodeURIComponent(key);
                        if (c.ws) c.ws += (c.ws.indexOf('?') === -1 ? '?' : '&') + 'key=' + encodeURIComponent(key);
                    }
                }
                return c;
            })();

            function setState(s) { state = s; }

            // Tolerant base64 -> bytes. A cert hash passed as ?certhash= arrives
            // via URLSearchParams, which turns '+' into a space; also accept the
            // base64url alphabet and missing padding.
            function b64ToBytes(s) {
                s = String(s).replace(/ /g, '+').replace(/-/g, '+').replace(/_/g, '/');
                while (s.length % 4) s += '=';
                var bin = atob(s);
                var out = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
                return out;
            }

            function deliverToWasm(channel, bytes) {
                if (typeof Module === 'undefined' || !Module._cow_net_deliver ||
                    !Module._malloc || !Module.HEAPU8) return;
                var ptr = Module._malloc(bytes.length || 1);
                Module.HEAPU8.set(bytes, ptr);
                Module._cow_net_deliver(channel, ptr, bytes.length);
                Module._free(ptr);
            }

            function onMsg(channel, bytes) {
                if (observer) { try { observer(channel, bytes); } catch (e) { } }
                deliverToWasm(channel, bytes);
            }

            async function readWholeStream(stream) {
                var reader = stream.getReader(), chunks = [], total = 0;
                for (; ;) {
                    var r = await reader.read();
                    if (r.done) break;
                    chunks.push(r.value); total += r.value.length;
                }
                var out = new Uint8Array(total), off = 0;
                for (var i = 0; i < chunks.length; i++) { out.set(chunks[i], off); off += chunks[i].length; }
                return out;
            }

            async function connectWebTransport(url, certHashB64) {
                var opts = {};
                if (certHashB64) {
                    var raw = b64ToBytes(certHashB64);
                    opts.serverCertificateHashes = [{ algorithm: 'sha-256', value: raw.buffer }];
                }
                var wt = new WebTransport(url, opts);
                await wt.ready;
                var dgWriter = wt.datagrams.writable.getWriter();
                sendFn = async function (channel, bytes) {
                    var copy = bytes.slice(); // detach from wasm HEAPU8 before awaiting
                    if (channel === 1) {
                        var s = await wt.createUnidirectionalStream();
                        var w = s.getWriter();
                        await w.write(copy); await w.close();
                    } else {
                        await dgWriter.write(copy);
                    }
                };
                (async function () {
                    var r = wt.datagrams.readable.getReader();
                    try { for (; ;) { var d = await r.read(); if (d.done) break; if (d.value) onMsg(0, new Uint8Array(d.value)); } } catch (e) { }
                })();
                (async function () {
                    var r = wt.incomingUnidirectionalStreams.getReader();
                    try {
                        for (; ;) {
                            var s = await r.read(); if (s.done) break;
                            readWholeStream(s.value).then(function (b) { onMsg(1, b); }).catch(function () { });
                        }
                    } catch (e) { }
                })();
                wt.closed.then(function () { setState(ST.DISCONNECTED); }).catch(function () { setState(ST.FAILED); });
                setState(ST.CONNECTED);
            }

            function connectWebSocket(url) {
                return new Promise(function (resolve, reject) {
                    var ws = new WebSocket(url);
                    ws.binaryType = 'arraybuffer';
                    ws.onopen = function () {
                        sendFn = function (channel, bytes) {
                            var framed = new Uint8Array(1 + bytes.length);
                            framed[0] = channel; framed.set(bytes, 1);
                            ws.send(framed);
                        };
                        setState(ST.CONNECTED); resolve();
                    };
                    ws.onmessage = function (e) { var b = new Uint8Array(e.data); if (b.length) onMsg(b[0], b.subarray(1)); };
                    ws.onclose = function () { setState(ST.DISCONNECTED); };
                    ws.onerror = function (e) { setState(ST.FAILED); reject(e); };
                });
            }

            async function connect(cfg) {
                cfg = cfg || config;
                if (!cfg || (!cfg.wt && !cfg.ws)) return;
                setState(ST.CONNECTING);
                if (cfg.wt && typeof WebTransport !== 'undefined') {
                    try { await connectWebTransport(cfg.wt, cfg.certHash); console.log('[CowNet] WebTransport connected', cfg.wt); return; }
                    catch (e) { console.warn('[CowNet] WebTransport failed; falling back to WebSocket', e); }
                }
                if (cfg.ws) {
                    try { await connectWebSocket(cfg.ws); console.log('[CowNet] WebSocket connected', cfg.ws); return; }
                    catch (e) { console.error('[CowNet] WebSocket failed', e); setState(ST.FAILED); return; }
                }
                setState(ST.FAILED);
            }

            return {
                connect: connect,
                send: function (channel, bytes) { if (sendFn) { try { sendFn(channel, bytes); } catch (e) { } } },
                stateCode: function () { return state; },
                setObserver: function (fn) { observer = fn; },
                hasServer: function () { return !!(config.wt || config.ws); },
                config: config,
            };
        })();

        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (!canvas) return;
            var ratio = window.devicePixelRatio || 1;
            var w, h;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = Math.max(1, Math.floor(w * ratio));
            canvas.height = Math.max(1, Math.floor(h * ratio));
            if (typeof Module !== 'undefined' && Module) Module.canvas = canvas;
        }
        document.addEventListener('DOMContentLoaded', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);
        document.addEventListener('fullscreenchange', resizeCanvas);

        // ---- On-screen touch controls ---------------------------------------
        // Left half drives a virtual stick, right half drags the camera. Both
        // feed the engine through its existing input paths (see the
        // touch-control bridge in src/platform/Window.cpp): the stick presses
        // the same GLFW keys a keyboard would, so player_movement.cow is
        // untouched, and the look pad pushes deltas down the same route
        // pointer-lock mousemove uses.
        //
        // Returns null when this isn't a touch device, so desktop is unaffected.
        function initTouchControls() {
            // maxTouchPoints alone is true of touch-capable laptops; requiring a
            // coarse primary pointer keeps the joystick off those.
            var coarse = false;
            try { coarse = window.matchMedia('(pointer: coarse)').matches; } catch (e) { }
            if (!coarse || !(navigator.maxTouchPoints > 0 || 'ontouchstart' in window))
                return null;

            // GLFW key codes (ASCII for printable keys; 340 = left shift).
            var K = { W: 87, A: 65, S: 83, D: 68, SPACE: 32, SHIFT: 340, C: 67 };
            var RADIUS = 56;    // px of travel for full deflection
            var DEAD = 0.28;    // fraction of travel ignored before a key engages
            var SPRINT = 0.92;  // beyond this, hold shift too
            // Look scale. The engine turns a delta into degrees as
            // delta * 5 (PlayerInputSystem) * 0.1 (Camera::sensitivity), so this
            // works out to ~0.55 deg per CSS pixel dragged — about a half-turn
            // across a phone screen. Device pixel ratio is deliberately NOT
            // applied (unlike the mouse path): finger travel is what matters,
            // and scaling by dpr would make a high-density screen whip around.
            var LOOK = 1.1;

            var layer = document.getElementById('touchControls');
            var stick = document.getElementById('stick');
            var knob = document.getElementById('stickKnob');

            var held = {};
            function setKey(code, down) {
                down = !!down;
                if (held[code] === down) return;   // only cross into wasm on change
                held[code] = down;
                if (Module._cow_touch_key) Module._cow_touch_key(code, down ? 1 : 0);
            }

            var moveId = null, lookId = null;
            var origin = { x: 0, y: 0 }, last = { x: 0, y: 0 };

            function placeStick(x, y) {
                stick.style.left = x + 'px';
                stick.style.top = y + 'px';
            }

            function releaseStick() {
                moveId = null;
                knob.style.transform = '';
                stick.classList.remove('active');
                // Park it bottom-left as a hint at where the stick lives.
                placeStick(100, window.innerHeight - 116);
                setKey(K.W, 0); setKey(K.A, 0); setKey(K.S, 0); setKey(K.D, 0);
                setKey(K.SHIFT, 0);
            }

            function applyStick(dx, dy) {
                var len = Math.sqrt(dx * dx + dy * dy);
                if (len > RADIUS) { dx = dx / len * RADIUS; dy = dy / len * RADIUS; len = RADIUS; }
                knob.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
                var nx = dx / RADIUS, ny = dy / RADIUS;
                setKey(K.W, ny < -DEAD);
                setKey(K.S, ny > DEAD);
                setKey(K.A, nx < -DEAD);
                setKey(K.D, nx > DEAD);
                setKey(K.SHIFT, len / RADIUS > SPRINT);
            }

            function look(dx, dy) {
                if (!Module._cow_touch_look) return;
                var s = (Module.mouseSensitivity || 1) * LOOK;
                Module._cow_touch_look(dx * s, dy * s);
            }

            layer.addEventListener('touchstart', function (e) {
                for (var i = 0; i < e.changedTouches.length; i++) {
                    var t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2) {
                        if (moveId !== null) continue;   // one thumb per zone
                        moveId = t.identifier;
                        origin.x = t.clientX; origin.y = t.clientY;
                        placeStick(t.clientX, t.clientY);
                        stick.classList.add('active');
                        knob.style.transform = '';
                    } else {
                        if (lookId !== null) continue;
                        lookId = t.identifier;
                        last.x = t.clientX; last.y = t.clientY;
                    }
                }
                e.preventDefault();
            }, { passive: false });

            layer.addEventListener('touchmove', function (e) {
                for (var i = 0; i < e.changedTouches.length; i++) {
                    var t = e.changedTouches[i];
                    if (t.identifier === moveId) {
                        applyStick(t.clientX - origin.x, t.clientY - origin.y);
                    } else if (t.identifier === lookId) {
                        look(t.clientX - last.x, t.clientY - last.y);
                        last.x = t.clientX; last.y = t.clientY;
                    }
                }
                e.preventDefault();
            }, { passive: false });

            function endTouch(e) {
                for (var i = 0; i < e.changedTouches.length; i++) {
                    var t = e.changedTouches[i];
                    if (t.identifier === moveId) releaseStick();
                    else if (t.identifier === lookId) lookId = null;
                }
                e.preventDefault();
            }
            layer.addEventListener('touchend', endTouch, { passive: false });
            layer.addEventListener('touchcancel', endTouch, { passive: false });

            // Buttons stop propagation so a tap on one doesn't also grab the
            // look finger — they sit inside the right-hand look zone.
            function bindButton(el, code) {
                function down(e) { e.preventDefault(); e.stopPropagation(); el.classList.add('held'); setKey(code, 1); }
                function up(e) { e.preventDefault(); e.stopPropagation(); el.classList.remove('held'); setKey(code, 0); }
                el.addEventListener('touchstart', down, { passive: false });
                el.addEventListener('touchend', up, { passive: false });
                el.addEventListener('touchcancel', up, { passive: false });
            }
            bindButton(document.getElementById('jumpBtn'), K.SPACE);
            bindButton(document.getElementById('shootBtn'), K.C);

            releaseStick();
            window.addEventListener('resize', function () {
                if (moveId === null) releaseStick();
            });
            // Open the cursor-disabled gate that mouse-look sits behind; there
            // is no pointer lock to acquire on a phone.
            if (Module._cow_touch_active) Module._cow_touch_active(1);

            return { show: function () { layer.classList.add('on'); } };
        }

        var Module = {
            noInitialRun: false,
            canvas: (function () { return document.getElementById('canvas'); })(),
            print: function () { console.log.apply(console, arguments); },
            printErr: function () { console.error.apply(console, arguments); },
            onRuntimeInitialized: function () {
                Module.mouseSensitivity = 1.0;
                document.getElementById('loadingOverlay').style.display = 'none';
                var startO = document.getElementById('startOverlay');
                startO.style.display = 'flex';
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });

                function requestLock() {
                    if (!canvas.requestPointerLock) return;
                    // Browsers impose a short cooldown after pointer lock is
                    // released and reject a request made inside it. Chrome
                    // returns a promise for that rejection, so swallow it
                    // rather than let it surface as an unhandled rejection —
                    // the next click, past the cooldown, succeeds.
                    var p = canvas.requestPointerLock();
                    if (p && p.catch) p.catch(function () { });
                }

                // Non-null only on a touch device; desktop keeps the mouse path.
                var touch = initTouchControls();
                if (touch) {
                    startO.querySelector('.hint').textContent =
                        'Left side to move, right side to look, buttons to jump and shoot';
                }

                function startGame() {
                    startO.style.display = 'none';
                    if (touch) {
                        touch.show();
                        return;   // no keyboard to focus, no pointer lock to take
                    }
                    canvas.focus();
                    requestLock();
                }
                startO.addEventListener('click', startGame);

                // Clicking the canvas while unlocked re-acquires pointer lock.
                // Tab (and the browser's own Escape) release it; without this
                // the only way back into mouse-look was reloading the page.
                // The click is the user gesture the browser requires to grant.
                if (!touch) {
                    canvas.addEventListener('click', function () {
                        if (document.pointerLockElement !== canvas) requestLock();
                    });
                }
                resizeCanvas();
                // Multiplayer connection is driven by the WASM client
                // (WebClientTransport) using the config CowNet resolved above.
            }
        };
    </script>
    <script async src="CowEngine.js"></script>
</body>

</html>

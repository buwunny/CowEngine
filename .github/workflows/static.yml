name: Deploy static content to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3 git

      - name: Install and activate EMSDK, build web
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          cd $GITHUB_WORKSPACE
          emcmake cmake --preset game-web
          cmake --build --preset game-web -j
          cmake --install build/game-web
          emcmake cmake --preset editor-web
          cmake --build --preset editor-web -j
          cmake --install build/editor-web
        shell: bash

      - name: Assemble site (editor at /, networked game at /play)
        env:
          # Set repository variable COWENGINE_SERVER_WS to bake the multiplayer
          # server into the published game, e.g. wss://game.cowengine.com
          # (and optionally COWENGINE_SERVER_WT for the WebTransport URL). Leave
          # unset to publish a single-player game (players can still opt in with
          # ?ws=/?wt= query params).
          COWENGINE_SERVER_WS: ${{ vars.COWENGINE_SERVER_WS }}
          COWENGINE_SERVER_WT: ${{ vars.COWENGINE_SERVER_WT }}
        run: |
          mkdir -p site
          cp -r dist/editor-web/. site/
          mkdir -p site/play
          cp -r dist/game-web/. site/play/
          python3 - <<'PY'
          import os
          ws = os.environ.get("COWENGINE_SERVER_WS", "").strip()
          wt = os.environ.get("COWENGINE_SERVER_WT", "").strip()
          if not (ws or wt):
              print("No COWENGINE_SERVER_WS/_WT set — game published single-player.")
              raise SystemExit(0)
          fields = []
          if ws: fields.append(f'ws:"{ws}"')
          if wt: fields.append(f'wt:"{wt}"')
          obj = "{" + ",".join(fields) + "}"
          path = "site/play/index.html"
          with open(path, encoding="utf-8") as f:
              html = f.read()
          marker = "var __COWENGINE_SERVER__ = null;"
          if marker not in html:
              print("WARNING: server-config marker not found in game index.html")
              raise SystemExit(0)
          html = html.replace(marker, f"var __COWENGINE_SERVER__ = {obj};")
          with open(path, "w", encoding="utf-8") as f:
              f.write(html)
          print(f"Baked server config into /play: {obj}")
          PY
        shell: bash

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
